name: Deploy To GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Validate form configuration
        env:
          VITE_STATICFORMS_API_KEY: ${{ secrets.VITE_STATICFORMS_API_KEY }}
          VITE_RECAPTCHA_SITE_KEY: ${{ vars.VITE_RECAPTCHA_SITE_KEY || secrets.VITE_RECAPTCHA_SITE_KEY }}
        run: |
          if [ -z "$VITE_STATICFORMS_API_KEY" ]; then
            echo "::error title=Missing VITE_STATICFORMS_API_KEY::Add the VITE_STATICFORMS_API_KEY Actions secret before deploying."
            exit 1
          fi

          if [ -z "$VITE_RECAPTCHA_SITE_KEY" ]; then
            echo "::error title=Missing VITE_RECAPTCHA_SITE_KEY::Add the VITE_RECAPTCHA_SITE_KEY Actions variable or secret before deploying."
            exit 1
          fi

      - name: Build site
        run: npm run build
        env:
          VITE_STATICFORMS_API_KEY: ${{ secrets.VITE_STATICFORMS_API_KEY }}
          VITE_RECAPTCHA_SITE_KEY: ${{ vars.VITE_RECAPTCHA_SITE_KEY || secrets.VITE_RECAPTCHA_SITE_KEY }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
